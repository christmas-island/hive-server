name: CI

on:
  workflow_call:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.number || 'main' }}
  cancel-in-progress: true

env:
  # Fail the build if unit coverage drops below this percentage.
  # Baseline established at 60% after go-sqlmock store tests (06ec1cf).
  COVERAGE_THRESHOLD: "60"
  # Fail the build if diff coverage on new/changed code drops below this percentage.
  DIFF_COVERAGE_THRESHOLD: "80"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          cache: pip
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: ".go-version"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: ".go-version"
      - name: Run tests with coverage
        run: go test -v -coverprofile=coverage.out -covermode=atomic ./...
      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          go tool cover -html=coverage.out -o coverage.html
      - name: Enforce coverage threshold
        run: |
          total=$(grep '^total:' coverage.txt | awk '{print $NF}' | tr -d '%')
          echo "Unit coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
          if awk "BEGIN {exit !($total < $COVERAGE_THRESHOLD)}"; then
            echo "❌ Coverage ${total}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "✅ Coverage ${total}% meets threshold ${COVERAGE_THRESHOLD}%"
      - name: Generate diff for PR
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Generate diff excluding integration-tagged Go files.
          # Files with //go:build integration are only compiled under -tags
          # integration and won't appear in unit coverage profiles, so
          # including them in diff coverage would always fail the gate.
          git diff "origin/${BASE_REF}...HEAD" > pr-full.diff

          # Build pathspec excludes for files that shouldn't count toward
          # diff coverage:
          #   1. Integration-tagged files (//go:build integration) — only
          #      compiled with -tags integration, invisible to unit coverage.
          #   2. Rename-only files — every added line has a corresponding
          #      removed line that differs only by identifier casing (e.g.
          #      buildMux → BuildMux). These have no new logic to cover.
          excludes=()
          while IFS= read -r f; do
            if [ ! -f "$f" ]; then
              continue
            fi

            # 1. Integration-tagged files.
            if head -1 "$f" | grep -q '//go:build integration'; then
              excludes+=(":!${f}")
              echo "Excluding (integration-tagged): $f"
              continue
            fi

            # 2. Rename-only detection: case-fold added/removed lines and
            #    compare. If they match, the diff is purely identifier casing.
            added=$(git diff "origin/${BASE_REF}...HEAD" -- "$f" \
              | grep '^+[^+]' | sed 's/^+//' | sort)
            removed=$(git diff "origin/${BASE_REF}...HEAD" -- "$f" \
              | grep '^-[^-]' | sed 's/^-//' | sort)
            if [ -n "$added" ] && [ -n "$removed" ]; then
              added_lc=$(echo "$added" | tr '[:upper:]' '[:lower:]')
              removed_lc=$(echo "$removed" | tr '[:upper:]' '[:lower:]')
              if [ "$added_lc" = "$removed_lc" ]; then
                excludes+=(":!${f}")
                echo "Excluding (rename-only): $f"
                continue
              fi
            fi
          done < <(git diff "origin/${BASE_REF}...HEAD" --name-only -- '*.go')

          if [ ${#excludes[@]} -gt 0 ]; then
            git diff "origin/${BASE_REF}...HEAD" -- . "${excludes[@]}" > pr.diff
          else
            cp pr-full.diff pr.diff
          fi
      - name: Run diff coverage check
        id: diff-coverage
        if: github.event_name == 'pull_request'
        uses: PanagiotisPtr/cov-diff@5e769845c123d52b7beb7777d9c9a0b3d7094830 # main
        with:
          path: .
          coverprofile: coverage.out
          diff: pr.diff
          module: github.com/christmas-island/hive-server
      - name: Enforce diff coverage threshold
        if: github.event_name == 'pull_request'
        run: |
          diff_cov="${{ steps.diff-coverage.outputs.covdiff }}"
          echo "Diff coverage: ${diff_cov}% (threshold: ${DIFF_COVERAGE_THRESHOLD}%)"
          if [ -z "$diff_cov" ]; then
            echo "ℹ️ No changed Go code detected — skipping diff coverage gate"
            exit 0
          fi
          if awk "BEGIN {exit !(${diff_cov} < ${DIFF_COVERAGE_THRESHOLD})}"; then
            echo "❌ Diff coverage ${diff_cov}% is below threshold ${DIFF_COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "✅ Diff coverage ${diff_cov}% meets threshold ${DIFF_COVERAGE_THRESHOLD}%"
      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
            coverage.txt
          retention-days: 30
      - name: Upload to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.out
          flags: unit
          fail_ci_if_error: false # don't block PRs if Codecov is unreachable
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.txt', 'utf8');
            const totalLine = coverage.split('\n').find(l => l.startsWith('total:'));
            const total = totalLine ? totalLine.split(/\s+/).pop() : 'unknown';
            const totalNum = parseFloat(total);
            const threshold = parseInt(process.env.COVERAGE_THRESHOLD, 10);
            const status = !isNaN(totalNum) && totalNum >= threshold ? '✅' : '❌';

            const diffCov = '${{ steps.diff-coverage.outputs.covdiff }}';
            const diffThreshold = parseInt(process.env.DIFF_COVERAGE_THRESHOLD, 10);
            let diffLine = '';
            if (diffCov && diffCov !== '') {
              const diffNum = parseFloat(diffCov);
              const diffStatus = !isNaN(diffNum) && diffNum >= diffThreshold ? '✅' : '❌';
              diffLine = `**Diff coverage: ${diffCov}%** ${diffStatus} _(threshold: ${diffThreshold}%)_`;
            } else {
              diffLine = `**Diff coverage: n/a** ℹ️ _(no changed Go code)_`;
            }

            const body = [
              '## 📊 Code Coverage',
              '```',
              coverage.trim(),
              '```',
              `**Total: ${total}** ${status} _(threshold: ${threshold}%)_`,
              diffLine,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 📊 Code Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  integration:
    name: Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: ".go-version"
      - name: Run integration tests (ephemeral CockroachDB)
        run: go test -v -race -count=1 -tags integration -timeout 300s -coverprofile=coverage-integration.out -covermode=atomic ./...
      - name: Generate integration coverage report
        run: go tool cover -func=coverage-integration.out | tee coverage-integration.txt
      - name: Upload integration coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-integration-report
          path: |
            coverage-integration.out
            coverage-integration.txt
          retention-days: 30
      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage-integration.out
          flags: integration
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Post integration coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage-integration.txt', 'utf8');
            const totalLine = coverage.split('\n').find(l => l.startsWith('total:'));
            const total = totalLine ? totalLine.split(/\s+/).pop() : 'unknown';
            const body = [
              '## 🧪 Integration Coverage (store layer)',
              '```',
              coverage.trim(),
              '```',
              `**Total: ${total}**`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 🧪 Integration Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
