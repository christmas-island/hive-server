name: Release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  ci:
    name: CI
    permissions:
      issues: write
      contents: write
      pull-requests: write
    uses: ./.github/workflows/ci.yaml
    secrets: inherit

  release:
    name: Release
    needs: ci
    permissions:
      contents: write # to be able to publish a GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          cache: npm
          cache-dependency-path: ".releaserc.yaml"
          node-version: lts/*
      - name: Semantic Release
        id: release
        run: |
          # Semantic Release
          npm install --no-save --no-package-lock \
            "@semantic-release/commit-analyzer" \
            "@semantic-release/release-notes-generator" \
            "@semantic-release/changelog" \
            "@semantic-release/git" \
            "@semantic-release/github" \
            "semantic-release-major-tag" \
            "conventional-changelog-conventionalcommits"
          npx semantic-release > release.log 2>&1 || true
          cat release.log
          if grep -q "There are no relevant changes, so no new version is released." release.log; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      publish: ${{ steps.release.outputs.publish }}

  publish:
    name: Publish
    needs: release
    if: ${{ needs.release.outputs.publish == 'true' }}
    permissions:
      contents: write # Upload artifacts
      id-token: write # SBOM signing
      packages: write # Docker builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        with:
          go-version-file: ".go-version"
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}

  build:
    name: Build and push SHA image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      sha-tag: sha-${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/christmas-island/hive-server
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-k8s-manifests:
    name: Update k8s manifests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CHRISTMAS_ISLAND_APP_ID }}
          private-key: ${{ secrets.CHRISTMAS_ISLAND_PRIVATE_KEY }}
          owner: christmas-island

      - name: Checkout k8s repo
        uses: actions/checkout@v4
        with:
          repository: christmas-island/k8s
          token: ${{ steps.app-token.outputs.token }}
          path: k8s

      - name: Update hive-server image tag
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cd k8s
          sed -i "s|ghcr.io/christmas-island/hive-server:.*|ghcr.io/christmas-island/hive-server:sha-${SHA}|g" hive-server/01-deployment.yaml

      - name: Create deploy PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cd k8s
          BRANCH="deploy/hive-server-sha-${SHA}"
          git config user.name "christmas-island[bot]"
          git config user.email "christmas-island[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git checkout -b "${BRANCH}"
          git add hive-server/
          git commit -m "chore: bump hive-server to sha-${SHA}"
          git push --force origin "${BRANCH}"
          gh pr create \
            --repo christmas-island/k8s \
            --base main \
            --head "${BRANCH}" \
            --title "chore: bump hive-server to sha-${SHA}" \
            --body $'Automated image tag update from CI.\n\nSource: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}' \
          || echo "PR already exists for ${BRANCH}"
